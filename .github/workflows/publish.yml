name: Publish SDK Packages

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: npm install

      - name: Build JS/TS Packages
        run: npm run build

      - name: Publish to NPM
        run: |
          npm publish --workspace=@moring-auth/core --access public
          npm publish --workspace=@moring-auth/react --access public
          npm publish --workspace=@moring-auth/nextjs --access public
          npm publish --workspace=@moring-auth/express --access public
          npm publish --workspace=@moring-auth/cli --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install PyPI build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build and Publish moring-auth Core to PyPI
        run: |
          cd python/core
          python -m build
          twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

      - name: Build and Publish fastapi-moring-auth to PyPI
        run: |
          cd python/fastapi
          python -m build
          twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

      - name: Build and Publish django-moring-auth to PyPI
        run: |
          cd python/django
          python -m build
          twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
